# Rate limiting zones — defined at http context (this file is included inside http{})
# api: general API endpoints (30 r/s, burst 60)
# auth: login/register (5 r/s, burst 10) — app-level brute-force protection handles
#       the real limiting; this zone blocks volumetric DoS before requests hit Python
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_status 429;

# Concurrent connections per IP (protects against slowloris / connection exhaustion)
limit_conn_zone $binary_remote_addr zone=perip:10m;

server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Limit concurrent connections per IP across all locations
    limit_conn perip 50;

    # Security headers — applied to all responses including static files and errors.
    # Note: Content-Security-Policy is set by the FastAPI SecurityMiddleware for /api/
    # responses; these headers cover the SPA and file downloads that bypass FastAPI.
    # X-Content-Type-Options and X-Frame-Options are duplicated on /api/ responses
    # (harmless — both values are identical) to ensure coverage on all routes.
    # HSTS is intentionally omitted: this server listens on HTTP only. Add
    # Strict-Transport-Security at the HTTPS terminator (reverse proxy) upstream.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Batch receipt upload — expensive endpoint, tight rate + large body limit
    location /api/v1/receipts/batch {
        limit_req zone=api burst=5 nodelay;
        client_max_body_size 100m;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — tighter rate limit (longest prefix wins over /api/)
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        client_max_body_size 10m;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — long-lived connections, no rate limit, extended timeouts
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /files/ {
        proxy_pass http://127.0.0.1:8000;
    }
}
